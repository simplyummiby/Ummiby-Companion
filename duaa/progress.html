<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Monthly Duaa history for Morning, Evening, and Before Sleep.">
<title>Duaa History | Ummiby Companion</title>
<link rel="stylesheet" href="../css/duaa-shell.css">
<link rel="stylesheet" href="../css/duaa-history.css">
</head>
<body>
<div class="app-shell">
<aside class="sidebar" id="sidebar" aria-label="Primary navigation">
  <div class="brand"><span class="brand-mark" data-ui-icon="brand" aria-hidden="true"></span><div><p class="brand-name">Ummiby</p><p class="brand-subtitle">Qur’an &amp; Duaa</p></div></div>
  <nav class="main-nav">
    <a class="nav-link" href="../index.html"><span data-ui-icon="home" aria-hidden="true"></span> Home</a>
    <details class="nav-group"><summary><span><span data-ui-icon="book" aria-hidden="true"></span> Qur’an</span></summary><div class="nav-submenu"><a href="../quran/index.html">Qur’an Home</a><a href="../quran/reading-journey.html">Reading Journey</a><a href="../quran/ramadan-journey.html">Ramadan Journey</a><a href="../quran/surahs.html">Read by Surah</a><a href="../quran/go-to-ayah.html">Go to an Ayah</a></div></details>
    <details class="nav-group" open><summary><span><span data-ui-icon="sparkle" aria-hidden="true"></span> Duaa</span></summary><div class="nav-submenu"><a href="index.html">Duaa Home</a><a href="collections.html">Find a Duaa</a></div></details>
    <a class="nav-link" href="../settings.html"><span data-ui-icon="settings" aria-hidden="true"></span> Settings</a>
  </nav>
</aside>
<div class="page">
<header class="topbar">
  <button class="menu-button" id="menuButton" type="button" aria-controls="sidebar" aria-expanded="false"><span class="sr-only">Open navigation</span><span data-ui-icon="menu" aria-hidden="true"></span></button>
  <a class="back-home" href="index.html"><span data-ui-icon="arrow-left" aria-hidden="true"></span> Duaa Home</a>
</header>
<main class="duaa-history">
  <header class="history-heading">
    <p class="eyebrow">Daily Companion</p>
    <h1>Duaa History</h1>
    <p>Review your active days by collection and month.</p>
  </header>

  <section class="history-panel" aria-label="Monthly Duaa history">
    <div class="history-tabs" role="tablist" aria-label="Choose a tracked collection">
      <button class="history-tab" type="button" role="tab" aria-selected="true" data-history-collection="morning">Morning</button>
      <button class="history-tab" type="button" role="tab" aria-selected="false" data-history-collection="evening">Evening</button>
      <button class="history-tab" type="button" role="tab" aria-selected="false" data-history-collection="sleep">Before Sleep</button>
    </div>

    <div class="history-month-bar">
      <button class="history-month-button" type="button" data-history-previous aria-label="Previous month"><span data-ui-icon="arrow-left" aria-hidden="true"></span></button>
      <h2 class="history-month-title" data-history-month-title></h2>
      <button class="history-month-button" type="button" data-history-next aria-label="Next month"><span data-ui-icon="arrow-right" aria-hidden="true"></span></button>
    </div>
    <p class="history-summary" data-history-summary aria-live="polite"></p>

    <div class="calendar-weekdays" aria-hidden="true"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
    <div class="history-calendar" data-history-calendar aria-live="polite"></div>
  </section>
</main>
</div>
</div>
<div class="sidebar-backdrop" id="sidebarBackdrop" hidden></div>
<script src="../js/app-config.js"></script>
<script src="../js/app-shell.js"></script>
<script src="../js/duaa-app.js"></script>
<script src="../js/duaa-tracking.js"></script>
<script src="../js/duaa-history.js"></script>
</body>
</html>
