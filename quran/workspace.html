<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading Workspace | Ummiby Companion</title>
  <link rel="stylesheet" href="../css/quran-shell.css">
  <link rel="stylesheet" href="../css/quran-journey.css">
  <link rel="stylesheet" href="../css/quran-study-library.css">
</head>
<body>
<div class="app-shell workspace-shell">
  <aside class="sidebar quran-sidebar" id="sidebar">
    <a class="quran-brand" href="index.html"><span class="quran-brand-mark" data-ui-icon="book" aria-hidden="true"></span><span>Qur’an</span></a>
    <nav class="quran-nav" aria-label="Qur’an navigation">
      <a class="quran-nav-link" href="index.html"><span data-ui-icon="home" aria-hidden="true"></span>Home</a>
      <a class="quran-nav-link active" href="reading-journey.html"><span data-ui-icon="journey" aria-hidden="true"></span>Reading Journey</a>
      <a class="quran-nav-link" href="surahs.html"><span data-ui-icon="book" aria-hidden="true"></span>Browse by Surah</a>
    </nav>
  </aside>
  <div class="page">
    <header class="topbar workspace-topbar"><button class="menu-button" id="menuButton"><span class="sr-only">Open navigation</span><span data-ui-icon="menu" aria-hidden="true"></span></button><nav class="workspace-breadcrumb" aria-label="Breadcrumb"><a href="../index.html">App Home</a><span aria-hidden="true">›</span><a href="index.html">Qur’an Home</a><span aria-hidden="true">›</span><a href="reading-journey.html">Reading Unit Journey</a><span aria-hidden="true">›</span><span id="topUnitLabel"></span></nav></header>
    <main class="reading-workspace">
      <section class="workspace-heading">
        <p class="eyebrow" id="unitNumber">Reading Unit</p>
        <h1 id="unitTitle">Loading…</h1>
        <p class="workspace-reference" id="unitReference"></p>
        <div class="workspace-progress"><span id="unitProgressText"></span><div><i id="unitProgressFill"></i></div></div>
      </section>

      <section class="before-you-read" aria-labelledby="beforeHeading">
        <h2 id="beforeHeading"><span aria-hidden="true">✦</span> Topics in This Unit</h2>
        <ul id="beforeTopics" class="before-topics"></ul>
        <a class="study-library-shortcut" id="workspaceLibraryShortcut" href="#workspaceStudyLibrary">📚 Library (0)</a>
      </section>

      <section class="workspace-reading" aria-label="Reading Unit text">
        <div class="reading-display-tools">
          <label class="ayah-jump-control" for="workspaceAyahSelect">
            <span>Jump to ayah</span>
            <span class="select-shell"><select id="workspaceAyahSelect" aria-label="Jump to an ayah in this Reading Unit"></select></span>
          </label>
          <label class="translation-switch" for="translationToggle">
            <input type="checkbox" id="translationToggle" checked>
            <span class="translation-switch-track" aria-hidden="true"><span></span></span>
            <span class="translation-switch-label">Show English translation</span>
          </label>
        </div>
        <div id="workspaceAyahs" class="workspace-ayahs"></div>
      </section>

      <section class="workspace-completion" id="completionCard" hidden>
        <span data-ui-icon="check" aria-hidden="true"></span>
        <div><h2>Reading Unit complete</h2><p>Your progress has been saved. Continue whenever you are ready.</p></div>
      </section>

      <section id="workspaceStudyLibrary"></section>
    </main>

    <footer class="workspace-footer">
      <button id="previousUnit" class="workspace-nav-button workspace-footer-previous"><span data-ui-icon="arrow-left" aria-hidden="true"></span><span><small>Previous</small><strong id="previousLabel">Reading Unit</strong></span></button>
      <div class="workspace-footer-center">
        <div class="passage-progress" aria-label="Progress through this Reading Unit">
          <div class="passage-progress-labels"><span>Reading Unit progress</span><strong id="passageProgressText">0%</strong></div>
          <div class="passage-progress-track"><i id="passageProgressFill"></i></div>
        </div>
        <div class="workspace-footer-actions">
          <a class="workspace-index-link" href="reading-journey.html"><span data-ui-icon="journey" aria-hidden="true"></span>Index</a>
          <button id="completeUnit" class="complete-button" type="button"><span data-ui-icon="check" aria-hidden="true"></span><span>Mark Complete</span></button>
        </div>
      </div>
      <button id="nextUnit" class="workspace-nav-button next workspace-footer-next"><span><small>Next</small><strong id="nextLabel">Reading Unit</strong></span><span data-ui-icon="arrow-right" aria-hidden="true"></span></button>
    </footer>
    <button class="quran-back-to-top workspace-back-to-top" id="quranBackToTop" type="button" aria-label="Back to top" title="Back to top"><span data-ui-icon="arrow-up" aria-hidden="true"></span></button>
  </div>
</div>
<div class="sidebar-backdrop" id="sidebarBackdrop" hidden></div>
<script src="../js/quran-app.js"></script>
<script src="../js/data/quran-data.js"></script>
<script src="../js/app-config.js"></script>
<script src="../js/app-shell.js"></script>
<script src="../js/data/readingLibrary.js"></script>
<script src="../js/quran-reading-journey-state.js"></script>
<script src="../js/data/quran-study-library-data.js"></script>
<script src="../js/quran-study-library.js"></script>
<script src="../js/quran-workspace.js"></script>
</body>
</html>
